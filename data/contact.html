<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Message Received</title>
    <style>
      /* Base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Roboto", Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: #202124;
        background: #f8f9fa;
        padding: 20px;
      }

      .email-container {
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
        border-radius: 8px;
        box-shadow:
          0 1px 3px rgba(60, 64, 67, 0.3),
          0 4px 8px rgba(60, 64, 67, 0.15);
        overflow: hidden;
      }

      /* Header */
      .email-header {
        color: #000;
        border-bottom: 1px solid #000;
        padding: 20px 24px;
      }
      .email-header h1 {
        font-size: 18px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .email-header p {
        opacity: 0.9;
        font-size: 14px;
      }

      /* Content */
      .message-content {
        padding: 0;
      }
      .message-card {
        padding: 24px;
        border-bottom: 1px solid #e8eaed;
      }

      .message-header {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px;
      }
      .sender-info {
        flex-grow: 1;
      }
      .sender-name {
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .message-time {
        color: #5f6368;
        font-size: 13px;
      }

      .message-details {
        margin-top: 16px;
      }
      .detail-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid #f1f3f4;
      }
      .detail-row:last-child {
        border-bottom: none;
      }

      .detail-label {
        width: 80px;
        flex-shrink: 0;
        color: #5f6368;
        font-weight: 500;
      }
      .detail-value {
        color: #202124;
        flex: 1;
        word-break: break-word;
      }

      .message-text {
        background: #f8f9fa;
        padding: 16px;
        border-radius: 4px;
        margin-top: 8px;
        white-space: pre-wrap;
      }
      .message-box {
        margin-top: 10px;
        border: 1px solid #eeeeee;
        padding: 8px;
        border-radius: 3px;
      }
      .message-container {
        margin-top: 10px;
      }

      /* Footer */
      .email-footer {
        padding: 20px 24px;
        text-align: center;
        color: #5f6368;
        font-size: 12px;
        border-top: 1px solid #e8eaed;
      }

      /* Optional: smaller outer padding on very small screens, but keep layout */
      @media (max-width: 400px) {
        body {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="email-container">
      <div class="email-header">
        <h1>New Message Received</h1>
        <p>
          A message by <strong>{{full_name}}</strong> has been received. Kindly
          respond at your earliest convenience.
        </p>
      </div>

      <div class="message-content">
        <div class="message-card">
          <div class="message-header">
            <div class="sender-info">
              <div class="sender-name">{{full_name}}</div>
              <div class="message-time">{{time}}</div>
            </div>
          </div>

          <div class="message-details">
            <div class="detail-row">
              <div class="detail-label">Email :</div>
              <div class="detail-value">{{email}}</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">Company :</div>
              <div class="detail-value">{{company}}</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">Phone:</div>
              <div class="detail-value">{{phone}}</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">Service :</div>
              <div class="detail-value">{{service}}</div>
            </div>
            <div class="message-container">
              <div class="detail-label">Message :</div>
              <div class="detail-value">
                <div class="message-box">{{message}}</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="email-footer">
        This message was sent via the contact form on your website.
      </div>
    </div>
  </body>
</html>
